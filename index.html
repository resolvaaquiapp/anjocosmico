<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anjo Cósmico 🌌</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(rgba(15, 12, 27, 0.85), rgba(15, 12, 27, 0.85)), url('logo.png'), url('logo.png.jpg'), url('logo.png.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0f0c1b;
            color: #fff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh; 
            padding: 10px 15px 85px 15px; /* Espaço para o banner inferior fixo no celular */
        }

        /* CONTAINER DOS BANNERS ROTATIVOS AUTOGERENCIÁVEIS */
        .banner-wrapper {
            width: 100%;
            max-width: 520px;
            margin-bottom: 15px;
            text-align: right;
        }
        .banner-container {
            width: 100%;
            height: 65px;
            background: rgba(20, 16, 38, 0.65);
            border: 1px solid rgba(229, 193, 88, 0.2);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
        }
        .banner-container img:hover {
            filter: brightness(1.1);
        }
        .lnk-anuncie {
            display: inline-block;
            font-size: 0.75rem;
            color: #e5c158;
            text-decoration: none;
            margin-top: 4px;
            opacity: 0.8;
            transition: 0.3s;
        }
        .lnk-anuncie:hover {
            opacity: 1;
            text-decoration: underline;
        }
        
        /* BANNER INFERIOR FIXO NA TELA */
        .banner-rodape-fixo {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0;
            z-index: 999;
            width: calc(100% - 30px);
        }
        .container { 
            background: rgba(20, 16, 38, 0.75); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(229, 193, 88, 0.25); 
            padding: 25px 20px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 520px; 
            text-align: center; 
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.7); 
            margin-bottom: 20px;
        }
        
        .logo-site { width: 100%; max-width: 440px; height: auto; margin-bottom: 15px; border-radius: 12px; }
        
        p.subtitulo { 
            font-size: 1rem; 
            color: #e5c158; 
            margin-bottom: 25px; 
            font-weight: 600; 
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.5px;
        }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #f1f2f6; font-weight: 500; }
        
        input[type="text"], input[type="tel"], select { width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; background: rgba(15, 12, 27, 0.85); color: #fff; font-size: 1rem; outline: none; transition: 0.3s; height: 48px; }
        input[type="text"]:focus, input[type="tel"]:focus, select:focus { border-color: #e5c158; box-shadow: 0 0 10px rgba(229, 193, 88, 0.4); }
        
        .data-container { display: flex; gap: 10px; }
        .data-container .form-group { flex: 1; margin-bottom: 0; }
        
        .chk-container { display: flex; align-items: center; gap: 8px; margin-top: 12px; text-align: left; cursor: pointer; }
        .chk-container input { width: 18px; height: 18px; cursor: pointer; accent-color: #e5c158; }
        .chk-container span { font-size: 0.8rem; color: #dfe6e9; }

        .contador-creditos { font-size: 0.8rem; color: #a29bfe; margin-top: 10px; font-style: italic; }
        
        button.btn-principal { width: 100%; padding: 14px; background: linear-gradient(90deg, #5f27cd, #e5c158); background-size: 200% auto; border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.4s; margin-top: 20px; box-shadow: 0 4px 15px rgba(95, 39, 205, 0.4); height: 48px; }
        button.btn-principal:hover { background-position: right center; transform: translateY(-2px); }
        
        #resultado { margin-top: 25px; padding: 20px; border-radius: 12px; background: rgba(15, 12, 27, 0.9); border: 1px solid rgba(229, 193, 88, 0.3); border-left: 4px solid #e5c158; display: none; text-align: left; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #resultado h3 { font-size: 1.1rem; color: #e5c158; margin-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 5px; }
        .info-linha { margin-bottom: 8px; font-size: 0.95rem; color: #dfe6e9; }
        .info-linha strong { color: #fff; }
        
        /* BOTÕES DE PAGAMENTO MINIMALISTAS E SÓBRIOS */
        .opcoes-pagamento { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-venda { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; text-decoration: none; transition: 0.3s; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); height: 48px; }
        .btn-venda:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .btn-basico { background-color: #27ae60; }
        .btn-vip { background: linear-gradient(135deg, #706fd3, #474787); border: 1px solid rgba(255,255,255,0.1); }
        .btn-premium { background: linear-gradient(135deg, #d4af37, #aa8010); }

        /* PAINEL DO ANUNCIANTE (MODAL/SECRETO) */
        #painelAnunciante { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 12, 27, 0.95); z-index: 1000; padding: 20px; overflow-y: auto; align-items: center; justify-content: center; }
        .anunciante-box { background: rgba(20, 16, 38, 0.9); border: 1px solid #e5c158; padding: 25px; border-radius: 15px; width: 100%; max-width: 460px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; }
        .btn-fechar { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <!-- BANNER ROTATIVO SUPERIOR -->
    <div class="banner-wrapper">
        <div class="banner-container" id="bannerTopo">
            <img src="https://placeholder.com" alt="Anunciante" onclick="cliqueBanner('topo')">
        </div>
        <a href="#" class="lnk-anuncie" onclick="abrirPainelAnunciante(event)">👉 Anuncie aqui sua empresa</a>
    </div>

    <div class="container">
        <img src="logo.png" alt="Logomarca Anjo Cósmico" class="logo-site" onerror="this.src='logo.png.jpg'; this.onerror=function(){this.src='logo.png.png';}">
        <p class="subtitulo">Descubra sua assinatura astrológica e seu Anjo Guardião</p>
        
        <!-- FORMULÁRIO DE ENTRADA DO SITE -->
        <div class="form-group">
            <label for="nome">Seu Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome ou apelido">
        </div>

        <div class="form-group">
            <label for="whatsapp">Seu WhatsApp (com DDD):</label>
            <input type="tel" id="whatsapp" placeholder="(00) 00000-0000">
        </div>

        <div class="data-container">
            <div class="form-group">
                <label for="dia">Dia:</label>
                <select id="dia"></select>
            </div>
            <div class="form-group">
                <label for="mes">Mês:</label>
                <select id="mes">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ano">Ano:</label>
                <select id="ano">
                    <script>
                        for(let a=2026; a>=1940; a--) {
                            document.write(`<option value="${a}">${a}</option>`);
                        }
                    </script>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label for="codigoConvite">Possui Código de Convite?</label>
            <input type="text" id="codigoConvite" placeholder="Digite o Código de Luz do amigo">
        </div>

        <div id="contadorExibicao" class="contador-creditos"></div>
        <button class="btn-principal" onclick="descobrirPerfil()">Revelar Mapa Astral</button>
        <div id="resultado"></div>
    </div>

    <!-- BANNER ROTATIVO INFERIOR FIXO -->
    <div class="banner-wrapper banner-rodape-fixo">
        <div class="banner-container" id="bannerRodape">
            <img src="https://placeholder.com" alt="Anunciante" onclick="cliqueBanner('rodape')">
        </div>
    </div>

    <!-- PAINEL SELETO DO ANUNCIANTE AUTO-GERENCIÁVEL -->
    <div id="painelAnunciante">
        <div class="anunciante-box">
            <button class="btn-fechar" onclick="fecharPainelAnunciante()">×</button>
            <h3 style="color:#e5c158; margin-bottom:15px; text-align:center;">Monte Seu Anúncio Trimestral</h3>
            <p style="font-size:0.8rem; color:#b2bec3; margin-bottom:20px; text-align:center;">Apareça no topo e no rodapé do portal por 3 meses por apenas R$ 29,90 únicos!</p>
            
            <div class="form-group">
                <label>Nome do Estabelecimento:</label>
                <input type="text" id="anuncNome" placeholder="Ex: Pizzaria do Vale">
            </div>
            <div class="form-group">
                <label>Link de Destino (WhatsApp ou Cardápio):</label>
                <input type="text" id="anuncLink" placeholder="https://wa.me...">
            </div>
            <div class="form-group">
                <label>Link da Imagem do seu Banner (Retangular):</label>
                <input type="text" id="anuncImg" placeholder="Cole o link da foto do seu panfleto">
            </div>

            <button class="btn-principal" style="background:#27ae60;" onclick="processarPagamentoAnuncio()">Pagar R$ 29,90 no Mercado Pago</button>
            
            <div id="blocoAtivacao" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; display:none;">
                <label style="color:#e5c158;">Já pagou? Digite seu Código de Ativação:</label>
                <input type="text" id="codigoAtivacaoInput" placeholder="Ex: LUZ-ANUNCIO-XXXX">
                <button class="btn-principal" onclick="ativarBannerAutomatico()">Ativar Meu Banner Agora</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
